name: Guix Channel

# Configures the systole and guix-geng-project channels in channels.scm, runs "guix pull" to
# fetch the channels and update Guix, then installs custom slicer packages
# This verifies that the published channels work correctly.

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-latest]

    steps:
    - name: Install Guix
      run: |
        sudo apt-get update
        sudo apt-get install -y guix
        echo "LANG=en_US.utf8" >> $GITHUB_ENV
        
    - name: Configure Channels
      run: |
        mkdir -p ~/.config/guix
        cat > ~/.config/guix/channels.scm << 'EOF'
        (cons* (channel
                (name 'systole)
                (url "https://github.com/SystoleOS/guix-systole.git")
                (branch "main")
                (commit "3b42810"))
              (channel
                (name 'guix-geng-project)
                (url "https://github.com/DavinhDang/guix-geng-project.git")
                (branch "main"))
              %default-channels)
        EOF
        
    - name: Update Guix
      run: |
        guix pull
        echo "$HOME/.config/guix/current/bin" >> $GITHUB_PATH
        
    - name: Lint Packages
      continue-on-error: true
      run: guix lint slicer-custom-app-template myext slicer-app-generator
      
    - name: Install custom slicer packages
      run: guix install --fallback slicer-custom-app-template my-ext slicer-app-generator
      
    - name: Add Guix profile to PATH
      run: echo "$HOME/.guix-profile/bin" >> $GITHUB_PATH
      
    - name: Collect Guix Build Logs
      if: always()
      run: |
        mkdir -p guix-build-logs
        for f in /var/log/guix/drvs/*/*; do
          sudo cp "$f" guix-build-logs/ || true
        done
        gunzip guix-build-logs/*.gz 2>/dev/null || true
        
    - name: Upload Guix Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: guix-build-logs-${{ matrix.os }}
        path: guix-build-logs/
        
    - name: Stop Guix Daemon
      if: always()
      run: sudo systemctl stop guix-daemon
